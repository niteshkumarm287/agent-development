name: Auto-generate README

on:
  push:
    branches:
      - main

    paths-ignore:
      - 'README.md'
      - '.github/**'

permissions:
  contents: write
  id-token: write

jobs:
  generate-readme:
    runs-on: ubuntu-latest

    env:
      GCP_PROJECT_ID: game-d8160
      GCP_REGION: global

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Authenticate to Google Cloud
        id: auth
        uses: google-github-actions/auth@v2
        with:
          workload_identity_provider: projects/319512124676/locations/global/workloadIdentityPools/github-pool/providers/github-provider
          service_account: readme-gen-sa@game-d8160.iam.gserviceaccount.com

      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -r requirements.txt

      - name: Verify Google Cloud Auth
        run: |
          gcloud auth list
          gcloud config list
        continue-on-error: true

      - name: Generate README
        run: |
          python readme_gen.py .

      - name: Commit README back to repository
        uses: stefanzweifel/git-auto-commit-action@v5
        with:
          commit_message: "docs: auto-update README [skip ci]"
          file_pattern: README.md